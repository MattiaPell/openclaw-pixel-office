services:
  dashboard:
    build: .
    ports:
      - "3003:3000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:18789
    volumes:
      - ./public/sprites:/app/dist/sprites
    networks:
      - openclaw-net

networks:
  openclaw-net:
    external: true
