version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "3003:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_URL=http://localhost:8080
    volumes:
      - ./public/sprites:/app/public/sprites
    networks:
      - openclaw-net

networks:
  openclaw-net:
    external: true