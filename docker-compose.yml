services:
  dashboard:
    build: .
    ports:
      - "3003:3000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - VITE_OPENCLAW_API_URL=http://localhost:3001
      - VITE_OPENCLAW_GATEWAY_URL=http://host.docker.internal:18789
    volumes:
      - ./public/sprites:/app/dist/sprites
    networks:
      - openclaw-net

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3004:3004"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - /home/ubuntu/.openclaw/agents:/home/ubuntu/.openclaw/agents:ro
    networks:
      - openclaw-net
    depends_on:
      - dashboard

networks:
  openclaw-net:
    external: true
